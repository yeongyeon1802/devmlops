name: ml-cicd

on:
  push:
    branches:
      - main
      - "ch03-1-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # 모델 검증 임계값. 이 값을 1.0으로 올리면 배포 차단 상황을 재현할 수 있다.
  MODEL_ACCURACY_THRESHOLD: "1.0"

jobs:
  # 1단계: 코드 테스트와 모델 성능 검증을 함께 실행한다.
  # test_model_quality.py가 임계값 미달이면 여기서 파이프라인이 멈춘다.
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ch03-1
        run: pip install -e ".[dev]"

      - name: Run tests and model validation
        working-directory: ch03-1
        run: pytest -v

      - name: Upload model metrics
        uses: actions/upload-artifact@v7
        with:
          name: model-metrics
          path: ch03-1/model/metrics.json

  # 2단계: Docker 이미지가 정상적으로 만들어지는지 확인한다.
  # 빌드 과정에서 모델 학습이 다시 실행되어 이미지 안에 모델이 포함된다.
  docker-build:
    needs: test-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Build Docker image
        working-directory: ch03-1
        run: docker build -t devmlops-ml:${GITHUB_SHA::7} .

      - name: Inspect Docker image
        run: docker image inspect devmlops-ml:${GITHUB_SHA::7}

  # 3단계: ECR Push와 ECS 배포. environment: production을 지정하면
  # GitHub Environments에 설정한 승인자(reviewer)가 승인해야 실행된다.
  deploy:
    needs: docker-build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:ml-${IMAGE_TAG::7}"
          docker build -t "$IMAGE" ch03-1
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # ch02-3에서 만든 태스크 정의 템플릿과 ECS 서비스를 그대로 재사용한다.
      # 같은 서비스가 이번에는 ML 서빙 컨테이너를 실행하게 된다.
      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ch02-3/task-definition.json
          container-name: devmlops-fastapi
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
